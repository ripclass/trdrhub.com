version: profiles-v1
doc_type: packing_list
critical_fields:
  - gross_weight
  - net_weight
  - issue_date
  - issuer
review_gate:
  min_confidence: 0.80
  plaintext_min_confidence: 0.76
  require_evidence: true
pass_gate:
  min_confidence: 0.82
  plaintext_min_confidence: 0.80
  require_evidence: true
  cross_checks:
    - weight_consistency
plaintext_confidence:
  found_base: 0.30
  anchor_weight: 0.22
  pattern_weight: 0.16
  normalization_weight: 0.14
  context_weight: 0.10
  evidence_weight: 0.12
  parse_failed_base: 0.24
  anchor_parse_bonus: 0.08
  evidence_missing_penalty: 0.18
field_hints:
  gross_weight:
    min_kg: 0.1
    max_kg: 200000
    neighbor_window_lines: 2
  net_weight:
    min_kg: 0.1
    max_kg: 200000
    neighbor_window_lines: 2
  issue_date:
    neighbor_window_lines: 1
stage_tuning:
  top3_binary_min_quality: 0.58
  top3_binary_min_target_hits: 1
  top3_promotion_min_quality: 0.34
  top3_promotion_min_target_hits: 1
  top3_numeric_weight: 0.7
  top3_anchor_weight: 0.3
